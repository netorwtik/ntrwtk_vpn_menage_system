name: ntrwtk-vpn-payment-bot

services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-vpn_payments}
      POSTGRES_USER: ${POSTGRES_USER:-vpn_bot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      TZ: ${TZ:-Europe/Moscow}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}']
      interval: 5s
      timeout: 5s
      retries: 10

  migrate:
    build:
      context: .
      target: migrate
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-vpn_bot}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-vpn_payments}?schema=public
    depends_on:
      postgres:
        condition: service_healthy
    profiles:
      - tools
    restart: 'no'

  bot:
    build:
      context: .
      target: runtime
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-vpn_bot}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-vpn_payments}?schema=public
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
